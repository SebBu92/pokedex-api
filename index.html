<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pokédex</title>
</head>
<body>
    <h1>Seb´s Pokédex</h1>
    <form id="pokemonsuche" action="index.html" method="get">
        <input type="text" name="pokemon" placeholder="z.B. Pikachu oder 25">
        <select name="suchkriterium">
            <option value="name">A</option>
            <option value="id">1</option>
        </select>
    </form>
    <div id="pokedex">
        <img class"picture" src=""> 
        <p class="id">Hier kommt die ID.</p>
        <p class="name">Hier kommt der Name.</p>
        <p class="types">Hier kommen die Types.</p>
    </div>
    <script type="module" src="index.js"></script>
</body>
</html>
