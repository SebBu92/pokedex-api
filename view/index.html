<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pokédex</title>
</head>
<body>
    <h1>Seb´s Pokédex</h1>
    <form id="searchPokemon" method="get">
        <input class="inputForSearch" type="text" name="searchValue" placeholder="z.B. Pikachu oder 25">
    </form>
    <template id="pokecard_template">
        <div class="pokecard">
            <img class="pokemonPicture" src=""> 
            <p class="pokemonID"></p>
            <p class="pokemonName"></p>
            <div class="types-container"></div>
        </div>
    </template>
    <div id="pokedex"></div>
    <button id="loadPokemon">Mehr Pokemon laden</button>
    
    <script type="module" src="../main.js"></script>
</body>
</html>
